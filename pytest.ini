# Pytest entrypoint configuration used by the local and CI test suite.
[pytest]
pythonpath = .
testpaths = tests
markers =
    workflow: user-visible app workflow tests, including UI contracts when PySide6 is available
    real_gpt55: opt-in tests that spend real GPT 5.5 API tokens
    real_harness: opt-in tests that call the real Codex and Claude agent harnesses and spend provider tokens
    real_host: opt-in tests that touch the real OS desktop, clipboard, screenshot, tray, or input APIs
