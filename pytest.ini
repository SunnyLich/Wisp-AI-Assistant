# Pytest entrypoint configuration used by the local and CI test suite.
[pytest]
pythonpath = .
testpaths = tests
addopts = -p scripts.pytest_temp_cleanup
markers =
    internal: tests an internal contract rather than a complete user action
    user_path: drives a feature through the same production path a user triggers
    github_safe: safe for an ordinary GitHub-hosted runner
    isolated_host: requires a disposable VM or dedicated isolated test host
    windows: scheduled on Windows
    linux: scheduled on Linux
    macos: scheduled on macOS
    workflow: user-visible app workflow tests, including UI contracts when PySide6 is available
    real_gpt55: opt-in tests that spend real GPT 5.5 API tokens
    real_harness: opt-in tests that call the real Codex and Claude agent harnesses and spend provider tokens
    real_host: opt-in tests that touch the real OS desktop, clipboard, screenshot, tray, or input APIs
