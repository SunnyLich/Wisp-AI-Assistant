[addon]
id = "phase4-deps-requests"
name = "Phase 4 Dependency Test"
version = "1.0.0"
description = "Manual QA addon for dependency environment approval and repair."
entry = "__init__.py"
api_version = "1"

[permissions]
query = "modify"
response = "read"
ui = ["tray", "settings", "intents", "notifications"]

[dependencies]
packages = ["requests>=2.31"]

[[intents]]
id = "phase4-deps-intent"
label = "Dependency Test Prompt"
key = "d"
prompt = "Run the Phase 4 dependency addon test."

[[notifications]]
title = "Phase 4 Dependency Test"
message = "Dependency addon loaded."

