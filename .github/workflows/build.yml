# Builds tagged release artifacts for packaged Wisp distributions.
name: Build Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  prepare-release:
    name: Prepare draft release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Verify tag matches pyproject version
        run: |
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$project_version" = "$tag_version"

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --notes "Draft Wisp release."

  build-windows:
    name: Windows build
    needs: prepare-release
    if: always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped')
    runs-on: windows-latest
    environment: Release Signing

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            requirements/requirements-windows.lock
            requirements/requirements-build.lock

      - name: Build Windows artifact
        shell: pwsh
        run: .\tools\build_exe.ps1 -Clean -Yes

      - name: Sign in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Wisp executable
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_PROFILE }}
          files: ${{ github.workspace }}\dist\Wisp\Wisp.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Wisp
          description-url: https://github.com/SunnyLich/Wisp-AI-Assistant

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $safeRef = $env:GITHUB_REF_NAME -replace '[\\/]', '-'
          Compress-Archive -Path dist\Wisp -DestinationPath "dist\Wisp-$safeRef-windows-x64.zip" -Force

      - name: Upload Windows release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload $env:GITHUB_REF_NAME (Get-Item dist\Wisp-*-windows-x64.zip).FullName --clobber

      - name: Upload Windows artifact for manual run
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: wisp-windows
          path: dist/Wisp-*-windows-x64.zip
          if-no-files-found: error
          # Manual debug builds still use Actions artifact storage; release builds
          # publish directly to GitHub Releases to avoid Actions storage quota.
          retention-days: 1
          compression-level: 9

  build-linux:
    name: Linux build
    needs: prepare-release
    if: always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            requirements/requirements-linux.lock
            requirements/requirements-build.lock

      - name: Install Linux system dependencies
        run: |
          # GitHub-hosted Ubuntu images may include Microsoft apt sources we do
          # not use; transient 403s there can break apt-get update.
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources \
            /etc/apt/sources.list.d/packages-microsoft-prod.list \
            /etc/apt/sources.list.d/packages-microsoft-prod.sources
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libsndfile1

      - name: Make build script executable
        run: chmod +x ./tools/build_exe.sh

      - name: Build Linux artifact
        run: ./tools/build_exe.sh --clean --yes

      - name: Package Linux artifact
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          tar -czf "dist/Wisp-${safe_ref}-linux-x64.tar.gz" -C dist Wisp

      - name: Upload Linux release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/Wisp-*-linux-x64.tar.gz --clobber

      - name: Upload Linux artifact for manual run
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: wisp-linux
          path: dist/Wisp-*-linux-x64.tar.gz
          if-no-files-found: error
          # See the Windows job: keep manual debug artifacts short-lived.
          retention-days: 1
          compression-level: 9

  build-macos:
    name: macOS build
    needs: prepare-release
    if: always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped')
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            requirements/requirements-macos.lock
            requirements/requirements-build.lock

      - name: Make build script executable
        run: chmod +x ./tools/build_macos_app.sh

      - name: Build macOS artifact
        run: ./tools/build_macos_app.sh --clean --yes

      - name: Package macOS artifact
        run: |
          arch="$(uname -m)"
          if [ "$arch" = "x86_64" ]; then arch="x64"; fi
          safe_ref="${GITHUB_REF_NAME//\//-}"
          ditto -c -k --keepParent dist/Wisp.app "dist/Wisp-${safe_ref}-macos-${arch}.zip"

      - name: Upload macOS release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/Wisp-*-macos-*.zip --clobber

      - name: Upload macOS artifact for manual run
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: wisp-macos
          path: dist/Wisp-*-macos-*.zip
          if-no-files-found: error
          retention-days: 1
          compression-level: 9

  publish-release:
    name: Publish release manifest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-assets
          gh release download "$GITHUB_REF_NAME" \
            --dir release-assets \
            --pattern "Wisp-${GITHUB_REF_NAME}-*"

      - name: Generate update manifest
        run: |
          python scripts/make_release_manifest.py \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --out release-assets/wisp-release-manifest.json \
            --checksums-out release-assets/SHA256SUMS.txt \
            $(find release-assets -type f ! -name "wisp-release-manifest.json" -print)

      - name: Upload release manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" release-assets/wisp-release-manifest.json release-assets/SHA256SUMS.txt --clobber
