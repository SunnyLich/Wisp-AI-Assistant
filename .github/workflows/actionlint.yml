# Lints GitHub Actions syntax and expressions without relying on brittle text assertions.
name: Actionlint

on:
  push:
    paths:
      - ".github/actionlint.yaml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - ".github/actionlint.yaml"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
