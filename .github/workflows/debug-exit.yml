# Temporary diagnostic: locate which chunk-4 test file makes python exit 1
# on windows-latest despite all tests passing. Dispatch-only; delete after use.
name: Debug Windows exit code

on:
  workflow_dispatch:
  push:
    branches: [debug/ci-exit-bisect]

jobs:
  bisect:
    name: Per-file exit codes (windows-latest)
    runs-on: windows-latest
    env:
      PYTHONFAULTHANDLER: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            requirements/requirements-windows.lock
            requirements/requirements-dev.lock

      - name: Install Windows dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements-windows.lock -r requirements/requirements-dev.lock

      - name: Per-file pytest exit codes
        run: python scripts/run_ci_pytest_chunk.py --chunk-index 4 --chunk-total 4 --per-file
