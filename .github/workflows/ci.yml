# Runs the cross-platform CI checks for Wisp pull requests and branch pushes.
name: CI

on:
  push:
    branches: [main, Dev]
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "tests/**"
      - "scripts/**"
      - "config.py"
      - "requirements*.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "pytest.ini"
      - ".github/workflows/ci.yml"
      - ".github/workflows/macos.yml"
  pull_request:
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "tests/**"
      - "scripts/**"
      - "config.py"
      - "requirements*.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "pytest.ini"
      - ".github/workflows/ci.yml"
      - ".github/workflows/macos.yml"
  workflow_dispatch:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
            pytest.ini

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libportaudio2 libsndfile1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Byte-compile all sources
        run: python -m compileall -q core ui runtime config.py

      - name: Run test suite
        run: pytest -q -k "not platform_macos"
