# Runs the cross-platform CI checks for Wisp pull requests and branch pushes.
name: CI

on:
  push:
    branches: [main, Dev, profile-setup]
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "tests/**"
      - "scripts/**"
      - "tools/build_exe.ps1"
      - "tools/build_exe.sh"
      - "tools/build_macos_app.sh"
      - "config.py"
      - "requirements/*.txt"
      - "requirements/*.lock"
      - ".python-version"
      - "pyproject.toml"
      - "pytest.ini"
      - ".github/workflows/build.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/macos.yml"
  pull_request:
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "tests/**"
      - "scripts/**"
      - "tools/build_exe.ps1"
      - "tools/build_exe.sh"
      - "tools/build_macos_app.sh"
      - "config.py"
      - "requirements/*.txt"
      - "requirements/*.lock"
      - ".python-version"
      - "pyproject.toml"
      - "pytest.ini"
      - ".github/workflows/build.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/macos.yml"
  workflow_dispatch:

jobs:
  verify-locks:
    name: Verify dependency locks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v5

      - name: Verify Windows/Linux runtime locks are reproducible
        run: |
          normalize_lock() {
            sed '/^[[:space:]]*#/d;/^[[:space:]]*$/d' "$1"
          }
          windows_lock="$(mktemp)"
          linux_lock="$(mktemp)"
          python_minor="$(python -c 'import sys; print(f"{sys.version_info[0]}.{sys.version_info[1]}")')"
          uv pip compile requirements/requirements.txt \
            --no-header \
            --python-version "$python_minor" \
            --python-platform x86_64-pc-windows-msvc \
            --constraint requirements/requirements-windows.lock \
            --output-file "$windows_lock"
          diff -u <(normalize_lock requirements/requirements-windows.lock) <(normalize_lock "$windows_lock")
          uv pip compile requirements/requirements.txt \
            --no-header \
            --python-version "$python_minor" \
            --python-platform x86_64-manylinux_2_34 \
            --constraint requirements/requirements-linux.lock \
            --output-file "$linux_lock"
          diff -u <(normalize_lock requirements/requirements-linux.lock) <(normalize_lock "$linux_lock")

  test:
    name: Tests (${{ matrix.os }}, chunk ${{ matrix.chunk }}/4)
    needs: verify-locks
    runs-on: ${{ matrix.os }}
    env:
      PYTHONFAULTHANDLER: "1"
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        chunk: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements/requirements-windows.lock
            requirements/requirements-linux.lock
            requirements/requirements-dev.lock
            pyproject.toml
            pytest.ini

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          # GitHub-hosted Ubuntu images may include Microsoft apt sources we do
          # not use; transient 403s there can break apt-get update.
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources \
            /etc/apt/sources.list.d/packages-microsoft-prod.list \
            /etc/apt/sources.list.d/packages-microsoft-prod.sources
          sudo apt-get update
          sudo apt-get install -y libegl1 libportaudio2 libsndfile1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements-linux.lock -r requirements/requirements-dev.lock

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements-windows.lock -r requirements/requirements-dev.lock

      - name: Byte-compile all sources
        run: python -m compileall -q core ui runtime config.py

      - name: Run test suite
        run: python scripts/run_ci_pytest_chunk.py --chunk-index ${{ matrix.chunk }} --chunk-total 4

  real-harness:
    name: Real ChatGPT and Claude harnesses
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONFAULTHANDLER: "1"
      QT_QPA_PLATFORM: offscreen
      WISP_RUN_REAL_HARNESS_TESTS: "1"
      WISP_CODEX_HOME: ${{ runner.temp }}/wisp-codex-ci
      WISP_CODEX_CLI: codex

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            requirements/requirements-linux.lock
            requirements/requirements-dev.lock

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install live harness dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements-linux.lock -r requirements/requirements-dev.lock
          npm install --global @openai/codex@0.144.4

      - name: Authenticate isolated Codex test client
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Repository secret OPENAI_API_KEY is required for the real Codex harness test." >&2
            exit 1
          fi
          mkdir -p "$WISP_CODEX_HOME"
          printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key

      - name: Test real ChatGPT harness
        run: >-
          python -m pytest -ra --tb=short
          tests/test_real_harness_integration.py::test_real_codex_harness_resumes_a_live_conversation

      - name: Test real Claude harness
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Repository secret ANTHROPIC_API_KEY is required for the real Claude harness test." >&2
            exit 1
          fi
          python -m pytest -ra --tb=short \
            tests/test_real_harness_integration.py::test_real_claude_harness_resumes_a_live_conversation
