# Runs the cross-platform CI checks for Wisp pull requests and branch pushes.
name: CI

on:
  push:
    branches: [main, Dev]
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "tests/**"
      - "scripts/**"
      - "config.py"
      - "requirements*.txt"
      - "requirements*.lock"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "pytest.ini"
      - ".github/workflows/ci.yml"
      - ".github/workflows/macos.yml"
  pull_request:
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "tests/**"
      - "scripts/**"
      - "config.py"
      - "requirements*.txt"
      - "requirements*.lock"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "pytest.ini"
      - ".github/workflows/ci.yml"
      - ".github/workflows/macos.yml"
  workflow_dispatch:

jobs:
  verify-locks:
    name: Verify dependency locks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v5

      - name: Verify Windows/Linux runtime locks are reproducible
        run: |
          normalize_lock() {
            sed '/^[[:space:]]*#/d;/^[[:space:]]*$/d' "$1"
          }
          windows_lock="$(mktemp)"
          linux_lock="$(mktemp)"
          python_minor="$(python -c 'import sys; print(f"{sys.version_info[0]}.{sys.version_info[1]}")')"
          uv pip compile requirements.txt \
            --no-header \
            --python-version "$python_minor" \
            --python-platform x86_64-pc-windows-msvc \
            --constraint requirements-windows.lock \
            --output-file "$windows_lock"
          diff -u <(normalize_lock requirements-windows.lock) <(normalize_lock "$windows_lock")
          uv pip compile requirements.txt \
            --no-header \
            --python-version "$python_minor" \
            --python-platform x86_64-manylinux_2_34 \
            --constraint requirements-linux.lock \
            --output-file "$linux_lock"
          diff -u <(normalize_lock requirements-linux.lock) <(normalize_lock "$linux_lock")

  test:
    name: Tests (${{ matrix.os }})
    needs: verify-locks
    runs-on: ${{ matrix.os }}
    env:
      PYTHONFAULTHANDLER: "1"
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-windows.lock
            requirements-linux.lock
            requirements-dev.lock
            pyproject.toml
            pytest.ini

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libportaudio2 libsndfile1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-linux.lock -r requirements-dev.lock

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-windows.lock -r requirements-dev.lock

      - name: Byte-compile all sources
        run: python -m compileall -q core ui runtime config.py

      - name: Run test suite
        run: python -X faulthandler -m pytest -ra --tb=short -k "not platform_macos" --basetemp .pytest-tmp-ci
