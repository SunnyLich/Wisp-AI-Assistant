name: CI

on:
  push:
    branches: [main, Dev]
    paths:
      - "core/**"
      - "ui/**"
      - "auth/**"
      - "context_router/**"
      - "llm_clients/**"
      - "memory_store/**"
      - "tests/**"
      - "scripts/**"
      - "main.py"
      - "config.py"
      - "requirements*.txt"
      - "pytest.ini"
      - ".github/workflows/ci.yml"
      - ".github/workflows/macos.yml"
  pull_request:
    paths:
      - "core/**"
      - "ui/**"
      - "auth/**"
      - "context_router/**"
      - "llm_clients/**"
      - "memory_store/**"
      - "tests/**"
      - "scripts/**"
      - "main.py"
      - "config.py"
      - "requirements*.txt"
      - "pytest.ini"
      - ".github/workflows/ci.yml"
      - ".github/workflows/macos.yml"
  workflow_dispatch:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-light.txt
            pytest.ini

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-light.txt pytest

      - name: Byte-compile all sources
        run: python -m compileall -q core ui auth context_router llm_clients memory_store main.py config.py

      - name: Run test suite
        run: pytest -q -k "not platform_macos"
