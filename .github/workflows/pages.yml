name: Deploy Wisp Website

on:
  push:
    branches:
      - main
    paths:
      - "Wisp Website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          site_dir="$RUNNER_TEMP/wisp-site"
          mkdir -p "$site_dir"
          cp -R "Wisp Website/." "$site_dir/"
          cp "$site_dir/Wisp Docs.html" "$site_dir/index.html"
          touch "$site_dir/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/wisp-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
