name: macOS compatibility

# Verifies the GitHub-safe suite and pyobjc-backed platform helpers on macOS.
# Qt widget workflows run offscreen. Global hotkeys and privacy-permission flows
# remain in the isolated-host workflow because hosted runners cannot grant them.
#
# Note: macOS runner minutes bill at 10x on private repos. Triggers are scoped to
# relevant paths + manual dispatch to keep cost down.

on:
  push:
    branches: [main, Dev, profile-setup]
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "tests/**"
      - "config.py"
      - "requirements/*.txt"
      - "requirements/*.lock"
      - "pyproject.toml"
      - "requirements/requirements-macos.lock"
      - "requirements/requirements-dev.lock"
      - "requirements/requirements-build.lock"
      - "scripts/compile_dependency_locks.sh"
      - "scripts/compile_macos_lock.sh"
      - "scripts/macos_testbot.py"
      - "scripts/macos_smoke.py"
      - "scripts/test_map.py"
      - "scripts/run_ci_pytest_chunk.py"
      - "pytest.ini"
      - ".python-version"
      - ".github/workflows/macos.yml"
  pull_request:
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "tests/**"
      - "config.py"
      - "requirements/*.txt"
      - "requirements/*.lock"
      - "pyproject.toml"
      - "requirements/requirements-macos.lock"
      - "requirements/requirements-dev.lock"
      - "requirements/requirements-build.lock"
      - "scripts/compile_dependency_locks.sh"
      - "scripts/compile_macos_lock.sh"
      - "scripts/macos_testbot.py"
      - "scripts/macos_smoke.py"
      - "scripts/test_map.py"
      - "scripts/run_ci_pytest_chunk.py"
      - "pytest.ini"
      - ".python-version"
      - ".github/workflows/macos.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      PYTHONFAULTHANDLER: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            requirements/requirements-macos.lock
            requirements/requirements-dev.lock
            pyproject.toml

      - uses: astral-sh/setup-uv@v5

      - name: Verify macOS lock is reproducible
        run: |
          normalize_lock() {
            sed '/^[[:space:]]*#/d;/^[[:space:]]*$/d' "$1"
          }
          tmp_lock="$(mktemp)"
          python_minor="$(python -c 'import sys; print(f"{sys.version_info[0]}.{sys.version_info[1]}")')"
          uv pip compile requirements/requirements.txt \
            --no-header \
            --python "$(command -v python)" \
            --python-version "$python_minor" \
            --python-platform aarch64-apple-darwin \
            --constraint requirements/requirements-macos.lock \
            --output-file "$tmp_lock"
          diff -u <(normalize_lock requirements/requirements-macos.lock) <(normalize_lock "$tmp_lock")

      - name: Verify tooling locks are reproducible
        run: |
          normalize_lock() {
            sed '/^[[:space:]]*#/d;/^[[:space:]]*$/d' "$1"
          }
          dev_lock="$(mktemp)"
          build_lock="$(mktemp)"
          python_minor="$(python -c 'import sys; print(f"{sys.version_info[0]}.{sys.version_info[1]}")')"
          uv pip compile requirements/requirements-dev.txt \
            --universal \
            --no-header \
            --python-version "$python_minor" \
            --constraint requirements/requirements-dev.lock \
            --output-file "$dev_lock"
          diff -u <(normalize_lock requirements/requirements-dev.lock) <(normalize_lock "$dev_lock")
          uv pip compile requirements/requirements-build.txt \
            --universal \
            --no-header \
            --python-version "$python_minor" \
            --constraint requirements/requirements-build.lock \
            --output-file "$build_lock"
          diff -u <(normalize_lock requirements/requirements-build.lock) <(normalize_lock "$build_lock")

      - name: Install locked dependencies
        run: |
          uv pip sync requirements/requirements-macos.lock --python "$(command -v python)" --strict
          uv pip install --python "$(command -v python)" -r requirements/requirements-dev.lock

      - name: Byte-compile all sources
        run: python -m compileall -q core ui runtime config.py

      - name: Headless import + pyobjc smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python scripts/macos_smoke.py

      - name: Native SSL init stress test
        run: python scripts/macos_testbot.py ssl-race --iterations 20

      - name: Verify test catalogue and schedules
        run: python scripts/test_map.py --check

      # One test file per process keeps a native Qt crash from destroying the
      # rest of the run. The single macOS job also keeps execution serial.
      - name: Run GitHub-safe test suite serially
        run: python scripts/run_ci_pytest_chunk.py --chunk-index 1 --chunk-total 1 --per-file
