name: macOS compatibility

# Verifies the app stays importable and the pyobjc-backed platform helpers run
# on real macOS, without needing a Mac locally. GUI behaviour, global hotkeys and
# the Accessibility/Screen-Recording permission flow still require manual testing.
#
# Note: macOS runner minutes bill at 10x on private repos. Triggers are scoped to
# relevant paths + manual dispatch to keep cost down.

on:
  push:
    branches: [main, Dev]
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "config.py"
      - "requirements*.txt"
      - "requirements*.lock"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "requirements-macos.lock"
      - "requirements-dev.lock"
      - "requirements-build.lock"
      - "scripts/compile_dependency_locks.sh"
      - "scripts/compile_macos_lock.sh"
      - "scripts/macos_testbot.py"
      - "scripts/macos_smoke.py"
      - ".python-version"
      - ".github/workflows/macos.yml"
  pull_request:
    paths:
      - "core/**"
      - "ui/**"
      - "runtime/**"
      - "packaging/**"
      - "config.py"
      - "requirements*.txt"
      - "requirements*.lock"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "requirements-macos.lock"
      - "requirements-dev.lock"
      - "requirements-build.lock"
      - "scripts/compile_dependency_locks.sh"
      - "scripts/compile_macos_lock.sh"
      - "scripts/macos_testbot.py"
      - "scripts/macos_smoke.py"
      - ".python-version"
      - ".github/workflows/macos.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            requirements-macos.lock
            requirements-dev.lock
            pyproject.toml

      - uses: astral-sh/setup-uv@v5

      - name: Verify macOS lock is reproducible
        run: |
          normalize_lock() {
            sed '/^[[:space:]]*#/d;/^[[:space:]]*$/d' "$1"
          }
          tmp_lock="$(mktemp)"
          python_minor="$(python -c 'import sys; print(f"{sys.version_info[0]}.{sys.version_info[1]}")')"
          uv pip compile requirements.txt \
            --no-header \
            --python "$(command -v python)" \
            --python-version "$python_minor" \
            --python-platform aarch64-apple-darwin \
            --constraint requirements-macos.lock \
            --output-file "$tmp_lock"
          diff -u <(normalize_lock requirements-macos.lock) <(normalize_lock "$tmp_lock")

      - name: Verify tooling locks are reproducible
        run: |
          normalize_lock() {
            sed '/^[[:space:]]*#/d;/^[[:space:]]*$/d' "$1"
          }
          dev_lock="$(mktemp)"
          build_lock="$(mktemp)"
          python_minor="$(python -c 'import sys; print(f"{sys.version_info[0]}.{sys.version_info[1]}")')"
          uv pip compile requirements-dev.txt \
            --universal \
            --no-header \
            --python-version "$python_minor" \
            --constraint requirements-dev.lock \
            --output-file "$dev_lock"
          diff -u <(normalize_lock requirements-dev.lock) <(normalize_lock "$dev_lock")
          uv pip compile requirements-build.txt \
            --universal \
            --no-header \
            --python-version "$python_minor" \
            --constraint requirements-build.lock \
            --output-file "$build_lock"
          diff -u <(normalize_lock requirements-build.lock) <(normalize_lock "$build_lock")

      - name: Install locked dependencies
        run: |
          uv pip sync requirements-macos.lock --python "$(command -v python)" --strict

      - name: Byte-compile all sources
        run: python -m compileall -q core ui runtime config.py

      - name: Headless import + pyobjc smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python scripts/macos_smoke.py

      - name: Native SSL init stress test
        run: python scripts/macos_testbot.py ssl-race --iterations 20

      - name: Platform unit tests
        run: python -m unittest tests.test_platform_macos -v
