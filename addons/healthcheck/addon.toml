# Manifest for the bundled healthcheck addon used to exercise addon surfaces.
[addon]
id = "healthcheck"
name = "Healthcheck"
version = "1.0.0"
description = "Diagnostic addon that logs hook calls and contributes a ping tool."
entry = "__init__.py"
api_version = "1"
priority = 50

[permissions]
query = "read"
response = "read"
tools = true
hotkeys = true
ui = ["tray", "settings", "intents", "notifications"]

events = ["app.startup", "response.after"]

[[intents]]
id = "healthcheck-status"
key = "h"
label = "Healthcheck"
hint = "Ask Wisp to report addon status"
prompt = "Report Wisp addon health and confirm the addon host is responding."

[[notifications]]
title = "Healthcheck"
message = "Healthcheck addon loaded."

[[hotkeys]]
id = "healthcheck-hotkey"
label = "Healthcheck hotkey"
hotkey = "ctrl+alt+h"
prompt = "Report Wisp addon health from the healthcheck hotkey."
