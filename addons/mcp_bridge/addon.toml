# Bridges Model Context Protocol (MCP) servers into Wisp as model-callable tools,
# and ships an MCP server (context_server.py) exposing Wisp's desktop context to
# external MCP clients like Claude Desktop.
[addon]
id = "mcp-bridge"
name = "MCP Bridge"
version = "1.1.0"
description = "MCP both ways: connects to MCP servers in servers.json as a client, and serves Wisp's desktop context (selection, clipboard, browser, screen) to external MCP clients via context_server.py."
entry = "__init__.py"
api_version = "1"
priority = 60

[permissions]
tools = true
ui = ["settings"]
