# Exercises chat/bubble UI label surfaces without external dependencies.
[addon]
id = "ui-lab"
name = "UI Lab"
version = "1.0.0"
description = "Developer addon for creating saved hover labels and inline styles on selected chat/bubble text."
entry = "__init__.py"
api_version = "1"
priority = 90

[permissions]
response = "modify"
tools = true
ui = ["tray", "settings", "intents", "notifications", "text_annotations", "text_context_menu"]

[[intents]]
id = "ui-lab-demo-reply"
key = "u"
label = "UI lab"
hint = "Ask for a reply with repeated words you can label."
prompt = "Reply with one short paragraph that repeats the words Wisp and label so selected text labels can be tested."

[[notifications]]
title = "UI Lab"
message = "UI Lab addon loaded. Select text in chat or the bubble, then right-click to add a label."
